<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KanFlow — Team Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --blue-800: #1e40af;
      --blue-900: #1e3a8a;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --white: #ffffff;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.1), 0 10px 10px -5px rgba(0,0,0,.04);
      --radius: 10px;
      --radius-lg: 14px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--slate-50);
      color: var(--slate-800);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--slate-200);
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--blue-600);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--slate-400); font-weight: 700; }
    .board-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--slate-500);
      padding: 4px 10px;
      background: var(--slate-100);
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
    }
    .board-name:hover { background: var(--slate-200); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none; transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary { background: var(--blue-600); color: white; }
    .btn-primary:hover { background: var(--blue-700); }
    .btn-ghost { background: transparent; color: var(--slate-600); border: 1px solid var(--slate-200); }
    .btn-ghost:hover { background: var(--slate-100); }
    .btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .avatar-group { display: flex; align-items: center; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-400), var(--blue-700));
      border: 2px solid white; margin-left: -6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      cursor: pointer;
    }
    .avatar:first-child { margin-left: 0; }

    /* ─── BOARD AREA ─── */
    .board-area {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 20px 24px 24px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    /* ─── COLUMN ─── */
    .column {
      background: var(--slate-100);
      border-radius: var(--radius-lg);
      width: 290px;
      min-width: 290px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 118px);
      border: 1px solid var(--slate-200);
      transition: box-shadow .2s;
    }
    .column.drag-over {
      box-shadow: 0 0 0 2px var(--blue-400);
      background: var(--blue-50);
    }
    .col-header {
      padding: 14px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .col-header-left { display: flex; align-items: center; gap: 8px; }
    .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .col-title {
      font-size: 13px; font-weight: 700; color: var(--slate-700);
      cursor: pointer; border: 1px solid transparent; border-radius: 4px;
      padding: 2px 4px; line-height: 1.3;
    }
    .col-title:hover { border-color: var(--slate-300); background: white; }
    .col-count {
      font-size: 11px; font-weight: 700; color: var(--slate-400);
      background: var(--slate-200); border-radius: 20px; padding: 1px 7px;
    }
    .col-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 26px; height: 26px; border-radius: 6px; border: none;
      background: transparent; cursor: pointer; display: flex;
      align-items: center; justify-content: center; color: var(--slate-400);
      transition: all .15s;
    }
    .icon-btn:hover { background: var(--slate-200); color: var(--slate-700); }
    .icon-btn.red:hover { background: #fee2e2; color: #dc2626; }

    .col-cards {
      flex: 1; overflow-y: auto; padding: 4px 10px; min-height: 60px;
      scrollbar-width: thin; scrollbar-color: var(--slate-300) transparent;
    }
    .col-footer { padding: 10px 10px 12px; flex-shrink: 0; }
    .add-card-btn {
      width: 100%; padding: 8px 10px; border-radius: 8px; border: none;
      background: transparent; color: var(--slate-500); font-size: 13px;
      font-weight: 500; cursor: pointer; text-align: left; display: flex;
      align-items: center; gap: 6px; transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .add-card-btn:hover { background: white; color: var(--blue-600); box-shadow: var(--shadow); }

    /* ─── ADD COLUMN ─── */
    .add-col-btn {
      min-width: 240px; height: 52px; border-radius: var(--radius-lg);
      border: 2px dashed var(--slate-300); background: transparent;
      color: var(--slate-400); font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px; transition: all .2s;
      align-self: flex-start; margin-top: 0; font-family: 'DM Sans', sans-serif;
    }
    .add-col-btn:hover { border-color: var(--blue-400); color: var(--blue-600); background: var(--blue-50); }

    /* ─── CARD ─── */
    .card {
      background: white; border-radius: var(--radius);
      padding: 12px; margin-bottom: 8px; cursor: grab;
      box-shadow: var(--shadow); border: 1px solid var(--slate-200);
      transition: box-shadow .15s, transform .15s; position: relative;
      user-select: none;
    }
    .card:hover { box-shadow: var(--shadow-md); }
    .card:active { cursor: grabbing; transform: rotate(1.5deg); }
    .card.dragging { opacity: 0.4; }
    .card-labels { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .label-pill {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .4px;
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--slate-800); line-height: 1.4; margin-bottom: 6px; }
    .card-desc { font-size: 12px; color: var(--slate-500); line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    .card-meta-left { display: flex; align-items: center; gap: 6px; }
    .priority-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
      display: flex; align-items: center; gap: 3px;
    }
    .p-high { background: #fef2f2; color: #dc2626; }
    .p-med { background: #fffbeb; color: #d97706; }
    .p-low { background: #f0fdf4; color: #16a34a; }
    .due-date { font-size: 11px; color: var(--slate-400); display: flex; align-items: center; gap: 3px; }
    .due-date.overdue { color: #dc2626; }
    .due-date.due-soon { color: #d97706; }
    .log-count { font-size: 11px; color: var(--slate-400); display: flex; align-items: center; gap: 3px; }
    .card-assignees { display: flex; }
    .card-avatar {
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-400), var(--blue-700));
      border: 1.5px solid white; margin-left: -4px; font-size: 8px;
      font-weight: 700; color: white; display: flex; align-items: center; justify-content: center;
    }
    .card-avatar:first-child { margin-left: 0; }

    /* ─── MODAL OVERLAY ─── */
    .overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none;
      transition: opacity .2s; backdrop-filter: blur(3px);
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ─── CARD MODAL ─── */
    .card-modal {
      background: white; border-radius: var(--radius-lg);
      width: 660px; max-width: 95vw; max-height: 88vh;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-xl);
      transform: translateY(10px) scale(.98);
      transition: transform .2s;
      overflow: hidden;
    }
    .overlay.open .card-modal { transform: translateY(0) scale(1); }

    .modal-header {
      padding: 20px 24px 0; border-bottom: 1px solid var(--slate-100);
    }
    .modal-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .modal-title-input {
      font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
      color: var(--slate-800); border: none; outline: none; width: 100%;
      background: transparent; line-height: 1.3;
      border-bottom: 2px solid transparent; transition: border-color .15s;
    }
    .modal-title-input:focus { border-color: var(--blue-400); }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: var(--slate-100); cursor: pointer; display: flex;
      align-items: center; justify-content: center; color: var(--slate-500);
      flex-shrink: 0; transition: all .15s;
    }
    .modal-close:hover { background: var(--slate-200); color: var(--slate-800); }

    .modal-tabs { display: flex; gap: 0; }
    .modal-tab {
      padding: 10px 16px; font-size: 13px; font-weight: 600;
      color: var(--slate-500); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s; background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'DM Sans', sans-serif;
    }
    .modal-tab.active { color: var(--blue-600); border-bottom-color: var(--blue-600); }
    .modal-tab:hover:not(.active) { color: var(--slate-700); }

    .modal-body { display: flex; flex: 1; overflow: hidden; }
    .modal-main { flex: 1; padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .modal-sidebar {
      width: 220px; border-left: 1px solid var(--slate-100);
      padding: 20px 16px; overflow-y: auto; display: flex;
      flex-direction: column; gap: 16px; background: var(--slate-50);
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--slate-400); text-transform: uppercase; letter-spacing: .6px; }
    .form-input, .form-textarea, .form-select {
      border: 1.5px solid var(--slate-200); border-radius: 8px;
      padding: 9px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      color: var(--slate-800); background: white; outline: none;
      transition: border-color .15s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--blue-400); }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    /* Labels editor */
    .labels-container { display: flex; flex-wrap: wrap; gap: 6px; }
    .label-choice {
      font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; cursor: pointer; border: 2px solid transparent;
      transition: all .15s; text-transform: uppercase; letter-spacing: .4px;
      opacity: .5;
    }
    .label-choice.selected { opacity: 1; border-color: currentColor; }

    /* Activity log */
    .log-section { display: flex; flex-direction: column; gap: 0; }
    .log-add-area { background: var(--slate-50); border-radius: 10px; padding: 12px; border: 1px solid var(--slate-200); margin-bottom: 14px; }
    .log-add-area textarea {
      width: 100%; border: none; background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--slate-700);
      resize: none; outline: none; min-height: 60px; line-height: 1.5;
    }
    .log-add-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .log-type-select {
      font-size: 11px; font-weight: 600; color: var(--slate-500);
      border: 1px solid var(--slate-200); border-radius: 6px; padding: 4px 8px;
      background: white; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    .log-item { padding: 12px 0; border-bottom: 1px solid var(--slate-100); display: flex; gap: 10px; }
    .log-item:last-child { border-bottom: none; }
    .log-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--blue-400), var(--blue-700));
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white;
    }
    .log-content { flex: 1; }
    .log-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .log-author { font-size: 12px; font-weight: 700; color: var(--slate-700); }
    .log-time { font-size: 11px; color: var(--slate-400); }
    .log-type-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .lt-progress { background: #eff6ff; color: var(--blue-600); }
    .lt-move { background: #f0fdf4; color: #16a34a; }
    .lt-note { background: #fdf4ff; color: #9333ea; }
    .lt-blocker { background: #fef2f2; color: #dc2626; }
    .log-text { font-size: 13px; color: var(--slate-600); line-height: 1.5; }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 16px; }

    /* Column color picker */
    .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: all .15s;
    }
    .color-swatch.selected { border-color: var(--slate-700); transform: scale(1.15); }

    /* Col modal */
    .col-modal {
      background: white; border-radius: var(--radius-lg);
      width: 380px; max-width: 95vw;
      box-shadow: var(--shadow-xl);
      transform: translateY(10px) scale(.98);
      transition: transform .2s;
      padding: 24px;
    }
    .overlay.open .col-modal { transform: translateY(0) scale(1); }
    .col-modal h3 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: var(--slate-800); margin-bottom: 18px; }

    /* Sidebar fields */
    .sidebar-field { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-label { font-size: 11px; font-weight: 700; color: var(--slate-400); text-transform: uppercase; letter-spacing: .6px; }

    /* Confirm modal */
    .confirm-modal {
      background: white; border-radius: var(--radius-lg);
      width: 360px; max-width: 95vw; padding: 24px;
      box-shadow: var(--shadow-xl);
      transform: translateY(10px) scale(.98);
      transition: transform .2s;
    }
    .overlay.open .confirm-modal { transform: translateY(0) scale(1); }
    .confirm-modal h3 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: var(--slate-800); margin-bottom: 8px; }
    .confirm-modal p { font-size: 13px; color: var(--slate-500); margin-bottom: 20px; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Toast */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--slate-800); color: white; padding: 10px 16px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-lg); transform: translateX(120%);
      transition: transform .25s; display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateX(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 10px; }

    svg { display: block; }

    /* Empty state */
    .empty-col { text-align: center; padding: 24px 12px; color: var(--slate-400); font-size: 12px; }
    .empty-col svg { margin: 0 auto 8px; opacity: .4; }

    /* Inline edit column title */
    .col-title-input {
      font-size: 13px; font-weight: 700; color: var(--slate-700);
      border: 1px solid var(--blue-400); border-radius: 4px;
      padding: 2px 4px; background: white; outline: none;
      font-family: 'DM Sans', sans-serif; width: 140px;
    }

    .drag-placeholder {
      height: 80px; border-radius: 8px; background: var(--blue-50);
      border: 2px dashed var(--blue-300); margin-bottom: 8px;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo">Kan<span>Flow</span></div>
    <div class="board-name" id="boardNameDisplay">Daily Board</div>
  </div>
  <div class="topbar-right">
    <div class="avatar-group" id="avatarGroup"></div>
    <button class="btn btn-ghost" onclick="openMemberModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Tim
    </button>
    <button class="btn btn-primary" onclick="openCardModal(null, null)">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Tambah Task
    </button>
  </div>
</header>

<!-- BOARD -->
<div class="board-area" id="boardArea"></div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- CARD MODAL -->
<div class="overlay" id="cardOverlay" onclick="handleOverlayClick(event, 'cardOverlay')">
  <div class="card-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-header-top">
        <input class="modal-title-input" id="cardTitleInput" placeholder="Judul task..." />
        <button class="modal-close" onclick="closeCardModal()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" onclick="switchTab('detail')">Detail</button>
        <button class="modal-tab" onclick="switchTab('log')">Activity Log <span id="logBadge"></span></button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-main">
        <!-- Detail Tab -->
        <div class="tab-panel active" id="tabDetail">
          <div class="form-group">
            <label class="form-label">Deskripsi</label>
            <textarea class="form-textarea" id="cardDesc" placeholder="Jelaskan task ini..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Label</label>
            <div class="labels-container" id="labelsContainer"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Rencana Aksi</label>
            <textarea class="form-textarea" id="cardActionPlan" placeholder="Langkah-langkah yang akan dilakukan..." style="min-height:60px"></textarea>
          </div>
        </div>
        <!-- Log Tab -->
        <div class="tab-panel" id="tabLog">
          <div class="log-add-area">
            <textarea id="logInput" placeholder="Tulis catatan progress, kendala, atau rencana aksi..."></textarea>
            <div class="log-add-actions">
              <select class="log-type-select" id="logType">
                <option value="progress">📈 Progress Update</option>
                <option value="move">📦 Perpindahan</option>
                <option value="note">📝 Catatan</option>
                <option value="blocker">🚨 Kendala</option>
              </select>
              <button class="btn btn-primary" onclick="addLog()" style="padding:6px 12px;font-size:12px">Tambah</button>
            </div>
          </div>
          <div id="logList"></div>
        </div>
      </div>
      <div class="modal-sidebar">
        <div class="sidebar-field">
          <span class="sidebar-label">Status</span>
          <select class="form-select" id="cardColumnSelect" style="font-size:12px;padding:7px 10px"></select>
        </div>
        <div class="sidebar-field">
          <span class="sidebar-label">Priority</span>
          <select class="form-select" id="cardPriority" style="font-size:12px;padding:7px 10px">
            <option value="low">🟢 Low</option>
            <option value="med">🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div class="sidebar-field">
          <span class="sidebar-label">Due Date</span>
          <input type="date" class="form-input" id="cardDueDate" style="font-size:12px;padding:7px 10px" />
        </div>
        <div class="sidebar-field">
          <span class="sidebar-label">Assignee</span>
          <div id="assigneeList" style="display:flex;flex-direction:column;gap:6px"></div>
        </div>
        <div style="border-top:1px solid var(--slate-200);padding-top:12px;display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-primary" onclick="saveCard()" style="font-size:12px;padding:8px">💾 Simpan</button>
          <button class="btn btn-danger" id="deleteCardBtn" onclick="deleteCard()" style="font-size:12px;padding:8px">🗑 Hapus Task</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- COLUMN MODAL -->
<div class="overlay" id="colOverlay" onclick="handleOverlayClick(event, 'colOverlay')">
  <div class="col-modal" onclick="event.stopPropagation()">
    <h3 id="colModalTitle">Tambah Kolom</h3>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="form-group">
        <label class="form-label">Nama Kolom</label>
        <input class="form-input" id="colNameInput" placeholder="Contoh: In Review" />
      </div>
      <div class="form-group">
        <label class="form-label">Warna</label>
        <div class="color-swatches" id="colorSwatches"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
        <button class="btn btn-ghost" onclick="closeColModal()">Batal</button>
        <button class="btn btn-primary" onclick="saveColumn()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-modal" onclick="event.stopPropagation()">
    <h3 id="confirmTitle">Hapus Kolom?</h3>
    <p id="confirmMsg">Semua task di kolom ini juga akan terhapus. Yakin?</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Batal</button>
      <button class="btn btn-danger" id="confirmOkBtn">Hapus</button>
    </div>
  </div>
</div>

<!-- MEMBER MODAL -->
<div class="overlay" id="memberOverlay" onclick="handleOverlayClick(event, 'memberOverlay')">
  <div class="col-modal" onclick="event.stopPropagation()" style="width:400px">
    <h3>Kelola Tim</h3>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div style="display:flex;gap:8px">
        <input class="form-input" id="memberNameInput" placeholder="Nama anggota tim" style="flex:1" />
        <button class="btn btn-primary" onclick="addMember()">Tambah</button>
      </div>
      <div id="memberListModal" style="display:flex;flex-direction:column;gap:8px"></div>
      <div style="text-align:right"><button class="btn btn-ghost" onclick="closeMemberModal()">Selesai</button></div>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────
const COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#64748b'];
const LABEL_PRESETS = [
  { id:'frontend', name:'Frontend', bg:'#dbeafe', color:'#1d4ed8' },
  { id:'backend', name:'Backend', bg:'#dcfce7', color:'#15803d' },
  { id:'bug', name:'Bug', bg:'#fee2e2', color:'#b91c1c' },
  { id:'feature', name:'Feature', bg:'#ede9fe', color:'#6d28d9' },
  { id:'design', name:'Design', bg:'#fce7f3', color:'#be185d' },
  { id:'urgent', name:'Urgent', bg:'#fef3c7', color:'#b45309' },
  { id:'docs', name:'Docs', bg:'#f0fdf4', color:'#166534' },
  { id:'devops', name:'DevOps', bg:'#e0f2fe', color:'#075985' },
];

let state = {
  columns: [],
  cards: [],
  members: [],
  boardName: 'Daily Board',
};

// ─── STORAGE ─────────────────────────────────────────────
function save() { localStorage.setItem('kanflow_v1', JSON.stringify(state)); }
function load() {
  const raw = localStorage.getItem('kanflow_v1');
  if (raw) { state = JSON.parse(raw); }
  else { seedDefault(); }
}

function seedDefault() {
  state.members = [
    { id: uid(), name: 'Andi', initials: 'AN' },
    { id: uid(), name: 'Budi', initials: 'BU' },
  ];
  state.columns = [
    { id: uid(), name: 'Backlog', color: '#94a3b8' },
    { id: uid(), name: 'Todo', color: '#3b82f6' },
    { id: uid(), name: 'In Progress', color: '#f97316' },
    { id: uid(), name: 'Review', color: '#8b5cf6' },
    { id: uid(), name: 'Done', color: '#22c55e' },
  ];
  const col = state.columns;
  state.cards = [
    mk('Setup project repo & CI/CD pipeline', col[0].id, 'high', [], 'Buat repo GitHub, setup Actions, deploy ke staging', 'bug', 'backend'),
    mk('Desain wireframe halaman dashboard', col[1].id, 'med', [], 'Figma wireframe semua screen utama', 'design'),
    mk('Implementasi auth JWT', col[2].id, 'high', [state.members[0].id], 'Login, register, refresh token, guard route', 'backend', 'feature'),
    mk('Komponen Button & Input', col[2].id, 'low', [state.members[1].id], 'Bikin design system dasar', 'frontend', 'design'),
    mk('API endpoint products', col[3].id, 'med', [state.members[0].id], 'CRUD products dengan pagination', 'backend'),
    mk('Landing page hero section', col[4].id, 'low', [state.members[1].id], 'Sudah deployed ke staging', 'frontend'),
  ];
  save();
}

function mk(title, colId, priority, assignees, desc, ...labelIds) {
  const card = {
    id: uid(), title, colId, priority, assignees: assignees||[],
    desc: desc||'', labels: labelIds||[], dueDate: '', actionPlan: '', logs: []
  };
  if (priority === 'high') {
    const d = new Date(); d.setDate(d.getDate() + 2);
    card.dueDate = d.toISOString().split('T')[0];
  }
  card.logs.push({
    id: uid(), type: 'note', text: 'Task dibuat.', author: 'Sistem',
    time: new Date().toISOString()
  });
  return card;
}

function uid() { return Math.random().toString(36).slice(2,10); }

// ─── RENDER ──────────────────────────────────────────────
function render() {
  document.getElementById('boardNameDisplay').textContent = state.boardName;
  renderAvatars();
  renderBoard();
}

function renderAvatars() {
  const el = document.getElementById('avatarGroup');
  el.innerHTML = state.members.slice(0,5).map(m =>
    `<div class="avatar" title="${m.name}">${m.initials}</div>`
  ).join('');
}

function renderBoard() {
  const board = document.getElementById('boardArea');
  board.innerHTML = '';
  state.columns.forEach(col => {
    const cards = state.cards.filter(c => c.colId === col.id);
    board.appendChild(buildColumn(col, cards));
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-col-btn';
  addBtn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Tambah Kolom`;
  addBtn.onclick = () => openColModal(null);
  board.appendChild(addBtn);
  initDrag();
}

function buildColumn(col, cards) {
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.colId = col.id;
  el.innerHTML = `
    <div class="col-header">
      <div class="col-header-left">
        <div class="col-dot" style="background:${col.color}"></div>
        <span class="col-title" title="Klik untuk edit" onclick="inlineEditColTitle(this,'${col.id}')">${esc(col.name)}</span>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-actions">
        <button class="icon-btn" title="Edit kolom" onclick="openColModal('${col.id}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn red" title="Hapus kolom" onclick="confirmDeleteCol('${col.id}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>
    <div class="col-cards" data-col-id="${col.id}">
      ${cards.length === 0 ? `<div class="empty-col"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg>Belum ada task</div>` : cards.map(buildCard).join('')}
    </div>
    <div class="col-footer">
      <button class="add-card-btn" onclick="openCardModal(null,'${col.id}')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Tambah task
      </button>
    </div>`;
  return el;
}

function buildCard(card) {
  const labelPills = card.labels.map(lid => {
    const l = LABEL_PRESETS.find(x => x.id === lid);
    return l ? `<span class="label-pill" style="background:${l.bg};color:${l.color}">${l.name}</span>` : '';
  }).join('');

  const pClass = { high:'p-high', med:'p-med', low:'p-low' }[card.priority] || 'p-low';
  const pLabel = { high:'High', med:'Medium', low:'Low' }[card.priority] || 'Low';
  const pIcon = { high:'🔴', med:'🟡', low:'🟢' }[card.priority] || '🟢';

  let dueCls = 'due-date'; let dueStr = '';
  if (card.dueDate) {
    const diff = (new Date(card.dueDate) - new Date()) / 86400000;
    dueStr = formatDate(card.dueDate);
    if (diff < 0) dueCls += ' overdue';
    else if (diff < 2) dueCls += ' due-soon';
  }

  const assigneeHtml = (card.assignees||[]).slice(0,3).map(aid => {
    const m = state.members.find(x => x.id === aid);
    return m ? `<div class="card-avatar" title="${m.name}">${m.initials}</div>` : '';
  }).join('');

  return `<div class="card" draggable="true" data-card-id="${card.id}" onclick="openCardModal('${card.id}', null)">
    ${card.labels.length ? `<div class="card-labels">${labelPills}</div>` : ''}
    <div class="card-title">${esc(card.title)}</div>
    ${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ''}
    <div class="card-meta">
      <div class="card-meta-left">
        <span class="priority-badge ${pClass}">${pIcon} ${pLabel}</span>
        ${card.dueDate ? `<span class="${dueCls}"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${dueStr}</span>` : ''}
        ${card.logs.length > 1 ? `<span class="log-count"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>${card.logs.length}</span>` : ''}
      </div>
      ${assigneeHtml ? `<div class="card-assignees">${assigneeHtml}</div>` : ''}
    </div>
  </div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(str) {
  const d = new Date(str);
  return `${d.getDate()}/${d.getMonth()+1}`;
}

// ─── DRAG & DROP ─────────────────────────────────────────
let dragCardId = null;
let placeholder = null;

function initDrag() {
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragCardId = card.dataset.cardId;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      placeholder = document.createElement('div');
      placeholder.className = 'drag-placeholder';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      placeholder && placeholder.remove();
      placeholder = null;
      dragCardId = null;
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    });
  });

  document.querySelectorAll('.col-cards').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      const col = zone.closest('.column');
      col.classList.add('drag-over');
      const afterEl = getDragAfter(zone, e.clientY);
      if (afterEl) zone.insertBefore(placeholder, afterEl);
      else zone.appendChild(placeholder);
    });
    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) {
        zone.closest('.column').classList.remove('drag-over');
      }
    });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      const newColId = zone.dataset.colId;
      const card = state.cards.find(c => c.id === dragCardId);
      if (!card) return;
      const oldColId = card.colId;
      card.colId = newColId;
      if (oldColId !== newColId) {
        const oldCol = state.columns.find(c => c.id === oldColId);
        const newCol = state.columns.find(c => c.id === newColId);
        card.logs.unshift({
          id: uid(), type: 'move',
          text: `Dipindahkan dari "${oldCol?.name}" ke "${newCol?.name}".`,
          author: 'Sistem', time: new Date().toISOString()
        });
        toast(`Task dipindahkan ke "${newCol?.name}"`);
      }
      save(); render();
    });
  });
}

function getDragAfter(container, y) {
  const cards = [...container.querySelectorAll('.card:not(.dragging)')];
  return cards.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity }).element;
}

// ─── CARD MODAL ──────────────────────────────────────────
let currentCardId = null;
let currentColId = null;

function openCardModal(cardId, defaultColId) {
  currentCardId = cardId;
  currentColId = defaultColId || (state.columns[1]?.id || state.columns[0]?.id);

  const card = cardId ? state.cards.find(c => c.id === cardId) : null;

  // Populate column select
  const sel = document.getElementById('cardColumnSelect');
  sel.innerHTML = state.columns.map(col =>
    `<option value="${col.id}">${esc(col.name)}</option>`
  ).join('');
  sel.value = card ? card.colId : currentColId;

  document.getElementById('cardTitleInput').value = card ? card.title : '';
  document.getElementById('cardDesc').value = card ? card.desc : '';
  document.getElementById('cardPriority').value = card ? card.priority : 'med';
  document.getElementById('cardDueDate').value = card ? card.dueDate : '';
  document.getElementById('cardActionPlan').value = card ? (card.actionPlan||'') : '';

  // Labels
  const lc = document.getElementById('labelsContainer');
  lc.innerHTML = LABEL_PRESETS.map(l =>
    `<span class="label-choice${card && card.labels.includes(l.id) ? ' selected' : ''}"
      style="background:${l.bg};color:${l.color}"
      data-lid="${l.id}" onclick="toggleLabel(this)">${l.name}</span>`
  ).join('');

  // Assignees
  const al = document.getElementById('assigneeList');
  al.innerHTML = state.members.map(m =>
    `<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
      <input type="checkbox" value="${m.id}" ${card && card.assignees.includes(m.id) ? 'checked' : ''} style="accent-color:var(--blue-600)">
      <div class="card-avatar" style="width:22px;height:22px;font-size:9px">${m.initials}</div>
      ${esc(m.name)}
    </label>`
  ).join('');

  // Delete button visibility
  document.getElementById('deleteCardBtn').style.display = card ? '' : 'none';

  // Logs
  renderLogs(card);
  document.getElementById('logBadge').textContent = card && card.logs.length ? `(${card.logs.length})` : '';

  switchTab('detail');
  document.getElementById('cardOverlay').classList.add('open');
}

function closeCardModal() {
  document.getElementById('cardOverlay').classList.remove('open');
  currentCardId = null;
}

function switchTab(tab) {
  document.querySelectorAll('.modal-tab').forEach((t, i) => {
    t.classList.toggle('active', ['detail','log'][i] === tab);
  });
  document.getElementById('tabDetail').classList.toggle('active', tab === 'detail');
  document.getElementById('tabLog').classList.toggle('active', tab === 'log');
}

function toggleLabel(el) {
  el.classList.toggle('selected');
}

function renderLogs(card) {
  const list = document.getElementById('logList');
  if (!card || !card.logs.length) { list.innerHTML = '<p style="color:var(--slate-400);font-size:13px;text-align:center;padding:20px 0">Belum ada catatan</p>'; return; }
  list.innerHTML = [...card.logs].reverse().map(log => {
    const type = { progress:'lt-progress', move:'lt-move', note:'lt-note', blocker:'lt-blocker' }[log.type] || 'lt-note';
    const typeLabel = { progress:'Progress', move:'Pindah', note:'Catatan', blocker:'Kendala' }[log.type] || 'Catatan';
    const timeAgo = relativeTime(log.time);
    return `<div class="log-item">
      <div class="log-avatar">${log.author.slice(0,2).toUpperCase()}</div>
      <div class="log-content">
        <div class="log-meta">
          <span class="log-author">${esc(log.author)}</span>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="log-type-badge ${type}">${typeLabel}</span>
            <span class="log-time">${timeAgo}</span>
          </div>
        </div>
        <div class="log-text">${esc(log.text)}</div>
      </div>
    </div>`;
  }).join('');
}

function addLog() {
  const text = document.getElementById('logInput').value.trim();
  if (!text) { toast('Tulis catatan dulu ya!'); return; }
  if (!currentCardId) { toast('Simpan task dulu sebelum tambah log!'); return; }
  const card = state.cards.find(c => c.id === currentCardId);
  if (!card) return;
  card.logs.unshift({
    id: uid(), type: document.getElementById('logType').value,
    text, author: 'Saya', time: new Date().toISOString()
  });
  document.getElementById('logInput').value = '';
  document.getElementById('logBadge').textContent = `(${card.logs.length})`;
  renderLogs(card);
  save();
  toast('Catatan ditambahkan!');
}

function saveCard() {
  const title = document.getElementById('cardTitleInput').value.trim();
  if (!title) { toast('Judul task wajib diisi!'); return; }

  const selectedLabels = [...document.querySelectorAll('.label-choice.selected')].map(el => el.dataset.lid);
  const selectedAssignees = [...document.querySelectorAll('#assigneeList input:checked')].map(el => el.value);
  const colId = document.getElementById('cardColumnSelect').value;

  if (currentCardId) {
    const card = state.cards.find(c => c.id === currentCardId);
    const oldColId = card.colId;
    card.title = title;
    card.desc = document.getElementById('cardDesc').value;
    card.priority = document.getElementById('cardPriority').value;
    card.dueDate = document.getElementById('cardDueDate').value;
    card.actionPlan = document.getElementById('cardActionPlan').value;
    card.labels = selectedLabels;
    card.assignees = selectedAssignees;
    if (oldColId !== colId) {
      card.colId = colId;
      const oldCol = state.columns.find(c => c.id === oldColId);
      const newCol = state.columns.find(c => c.id === colId);
      card.logs.unshift({
        id: uid(), type: 'move',
        text: `Dipindahkan dari "${oldCol?.name}" ke "${newCol?.name}".`,
        author: 'Saya', time: new Date().toISOString()
      });
    }
  } else {
    const newCard = {
      id: uid(), title, colId,
      desc: document.getElementById('cardDesc').value,
      priority: document.getElementById('cardPriority').value,
      dueDate: document.getElementById('cardDueDate').value,
      actionPlan: document.getElementById('cardActionPlan').value,
      labels: selectedLabels,
      assignees: selectedAssignees,
      logs: [{ id: uid(), type: 'note', text: 'Task dibuat.', author: 'Saya', time: new Date().toISOString() }]
    };
    state.cards.push(newCard);
    currentCardId = newCard.id;
    document.getElementById('deleteCardBtn').style.display = '';
  }
  save(); render();
  closeCardModal();
  toast('Task berhasil disimpan! ✅');
}

function deleteCard() {
  if (!currentCardId) return;
  confirmAction('Hapus Task?', 'Task ini akan dihapus permanen.', () => {
    state.cards = state.cards.filter(c => c.id !== currentCardId);
    save(); render();
    closeCardModal();
    toast('Task dihapus.');
  });
}

function relativeTime(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'baru saja';
  if (diff < 3600) return `${Math.floor(diff/60)} mnt lalu`;
  if (diff < 86400) return `${Math.floor(diff/3600)} jam lalu`;
  return `${Math.floor(diff/86400)} hari lalu`;
}

// ─── INLINE COLUMN TITLE EDIT ────────────────────────────
function inlineEditColTitle(span, colId) {
  const col = state.columns.find(c => c.id === colId);
  if (!col) return;
  const input = document.createElement('input');
  input.className = 'col-title-input';
  input.value = col.name;
  span.replaceWith(input);
  input.focus();
  input.select();
  const finish = () => {
    const v = input.value.trim();
    if (v) col.name = v;
    save(); render();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); finish(); } });
}

// ─── COLUMN MODAL ─────────────────────────────────────────
let editingColId = null;
let selectedColor = COLORS[4];

function openColModal(colId) {
  editingColId = colId;
  const col = colId ? state.columns.find(c => c.id === colId) : null;
  document.getElementById('colModalTitle').textContent = col ? 'Edit Kolom' : 'Tambah Kolom';
  document.getElementById('colNameInput').value = col ? col.name : '';
  selectedColor = col ? col.color : COLORS[4];

  const swatches = document.getElementById('colorSwatches');
  swatches.innerHTML = COLORS.map(c =>
    `<div class="color-swatch${c === selectedColor ? ' selected' : ''}"
      style="background:${c}" data-color="${c}"
      onclick="pickColor(this, '${c}')"></div>`
  ).join('');

  document.getElementById('colOverlay').classList.add('open');
  setTimeout(() => document.getElementById('colNameInput').focus(), 100);
}

function pickColor(el, color) {
  selectedColor = color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function closeColModal() {
  document.getElementById('colOverlay').classList.remove('open');
  editingColId = null;
}

function saveColumn() {
  const name = document.getElementById('colNameInput').value.trim();
  if (!name) { toast('Nama kolom wajib diisi!'); return; }
  if (editingColId) {
    const col = state.columns.find(c => c.id === editingColId);
    col.name = name; col.color = selectedColor;
  } else {
    state.columns.push({ id: uid(), name, color: selectedColor });
  }
  save(); render(); closeColModal();
  toast(editingColId ? 'Kolom diperbarui!' : 'Kolom ditambahkan!');
}

function confirmDeleteCol(colId) {
  const col = state.columns.find(c => c.id === colId);
  const count = state.cards.filter(c => c.colId === colId).length;
  confirmAction(
    `Hapus kolom "${col?.name}"?`,
    `${count} task di kolom ini juga akan terhapus. Aksi ini tidak bisa dibatalkan.`,
    () => {
      state.cards = state.cards.filter(c => c.colId !== colId);
      state.columns = state.columns.filter(c => c.id !== colId);
      save(); render();
      toast('Kolom dihapus.');
    }
  );
}

// ─── MEMBER MODAL ─────────────────────────────────────────
function openMemberModal() {
  renderMemberList();
  document.getElementById('memberOverlay').classList.add('open');
}

function closeMemberModal() {
  document.getElementById('memberOverlay').classList.remove('open');
  render();
}

function renderMemberList() {
  const el = document.getElementById('memberListModal');
  if (!state.members.length) { el.innerHTML = '<p style="color:var(--slate-400);font-size:13px">Belum ada anggota tim</p>'; return; }
  el.innerHTML = state.members.map(m =>
    `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--slate-50);border-radius:8px;border:1px solid var(--slate-200)">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar" style="width:28px;height:28px;font-size:10px;margin:0">${m.initials}</div>
        <span style="font-size:13px;font-weight:600">${esc(m.name)}</span>
      </div>
      <button class="icon-btn red" onclick="removeMember('${m.id}')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>`
  ).join('');
}

function addMember() {
  const name = document.getElementById('memberNameInput').value.trim();
  if (!name) return;
  const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  state.members.push({ id: uid(), name, initials });
  document.getElementById('memberNameInput').value = '';
  renderMemberList();
  renderAvatars();
  save();
  toast(`${name} ditambahkan ke tim!`);
}

function removeMember(id) {
  state.members = state.members.filter(m => m.id !== id);
  state.cards.forEach(c => { c.assignees = (c.assignees||[]).filter(a => a !== id); });
  renderMemberList();
  save();
}

// ─── CONFIRM DIALOG ──────────────────────────────────────
function confirmAction(title, msg, onOk) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  const btn = document.getElementById('confirmOkBtn');
  btn.onclick = () => { closeConfirm(); onOk(); };
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}

// ─── TOAST ───────────────────────────────────────────────
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  requestAnimationFrame(() => { t.classList.add('show'); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}

// ─── OVERLAY CLICK ────────────────────────────────────────
function handleOverlayClick(e, overlayId) {
  if (e.target.id === overlayId) {
    document.getElementById(overlayId).classList.remove('open');
    if (overlayId === 'cardOverlay') currentCardId = null;
    if (overlayId === 'colOverlay') editingColId = null;
  }
}

// ─── BOARD NAME ───────────────────────────────────────────
document.getElementById('boardNameDisplay').addEventListener('dblclick', function() {
  const input = document.createElement('input');
  input.value = state.boardName;
  input.style.cssText = 'font-size:14px;font-weight:500;border:1px solid var(--blue-400);border-radius:6px;padding:4px 10px;outline:none;font-family:DM Sans,sans-serif;background:white;color:var(--slate-700)';
  this.replaceWith(input);
  input.focus();
  const finish = () => {
    state.boardName = input.value.trim() || 'Daily Board';
    save(); render();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') finish(); });
});

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.overlay.open').forEach(o => o.classList.remove('open'));
    currentCardId = null;
  }
});

// ─── INIT ─────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
